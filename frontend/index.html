<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sportylytics – Football Analytics Dashboard</title>
  <meta name="description" content="Live football scores, standings, match details and team stats." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
  <link rel="stylesheet" href="/static/css/style.css" />
  <script src="/static/js/api.js"></script>
  <script src="/static/js/utils.js"></script>
  <script src="/static/js/render.js" defer></script>
</head>
<body id="app-body">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content" id="main-content">
    <header class="top-header" id="top-header"></header>
    <main id="content-area">
        <div class="page-content">
            <div id="date-nav" class="date-nav"></div>
            <div id="matches-container" class="matches-container" style="margin-top:16px;">
                <div class="loading-spinner">Loading matches...</div>
            </div>
        </div>
    </main>
    <footer id="footer"></footer>
  </div>

  <script src="/static/js/main.js" defer></script>
  <script src="/static/js/matches.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
        const config = await getSiteConfig();
        if (config) {
            renderCommon(config);
            const params = new URLSearchParams(window.location.search);
            const date = params.get('date') || new Date().toISOString().split('T')[0];
            await renderIndex(date);
        }
    });
  </script>
</body>
</html>
